name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 🔹 Type safety (important for Next.js)
      - name: Type check
        run: pnpm tsc --noEmit

      # 🔹 Linting
      - name: Lint
        run: pnpm lint

      # 🔹 Run tests (FAILS pipeline if tests fail)
      - name: Run Tests
        run: pnpm test -- --coverage

      # 🔹 Build only if everything passes
      - name: Build
        run: pnpm build